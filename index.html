<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galib Academy | Eid Special</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;700&family=Noto+Serif+Bengali:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden;
        }

        /* ব্যাকগ্রাউন্ড লাইট ইফেক্ট */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
        }

        .card-wrapper {
            position: relative;
            width: 350px;
            height: 500px;
            background: linear-gradient(145deg, #111, #000);
            border-radius: 20px;
            padding: 2px; /* বর্ডার ইফেক্টের জন্য */
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            cursor: pointer;
            transition: transform 0.2s;
        }

        /* গোল্ডেন বর্ডার অ্যানিমেশন */
        .card-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 20px;
            background: linear-gradient(45deg, transparent, #d4af37, transparent);
            z-index: -1;
            animation: borderRotate 4s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .main-content {
            background: #0a0a0a;
            width: 100%;
            height: 100%;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .eid-title {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 3.8rem;
            color: #d4af37;
            margin: 0;
            line-height: 1.2;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .english-text {
            font-size: 0.8rem;
            letter-spacing: 8px;
            color: #888;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: #d4af37;
            margin: 30px 0;
        }

        .msg {
            color: #ccc;
            font-size: 1rem;
            width: 80%;
            text-align: center;
            line-height: 1.6;
            font-weight: 300;
        }

        .academy-branding {
            margin-top: 50px;
            text-align: center;
        }

        .academy-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }

        .tag {
            color: #d4af37;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }

        /* মাউস হোভার ইফেক্ট */
        .card-wrapper:hover .main-content {
            background: #0f0f0f;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card-wrapper" id="card">
        <div class="main-content">
            <h1 class="eid-title">ঈদ<br>মোবারক</h1>
            <div class="english-text">Eid Mubarak</div>
            
            <div class="divider"></div>
            
            <p class="msg">
                পবিত্র ঈদুল ফিতর আপনার ও আপনার পরিবারের জীবনে বয়ে আনুক অনাবিল আনন্দ ও সমৃদ্ধি।
            </p>

            <div class="academy-branding">
                <p class="academy-name">গালিব একাডেমি</p>
                <span class="tag">EXCELLENCE IN EDUCATION</span>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const glow = document.querySelector('.bg-glow');

        document.addEventListener('mousemove', (e) => {
            // কার্ড টিল্ট ইফেক্ট
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;

            // ব্যাকগ্রাউন্ড গ্লো মুভমেন্ট
            glow.style.left = e.pageX - 250 + 'px';
            glow.style.top = e.pageY - 250 + 'px';
        });

        card.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
        });

        card.addEventListener('mouseleave', () => {
            card.style.transition = 'all 0.5s ease';
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
