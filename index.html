<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak | Galib Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #000428;
            --accent-blue: #004e92;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #000428, #004e92);
            overflow: hidden;
            perspective: 1000px;
        }

        /* ব্যাকগ্রাউন্ড অ্যানিমেশন */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
        }

        .poster-card {
            position: relative;
            width: 400px;
            padding: 50px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.6s ease, box-shadow 0.6s ease;
            transform-style: preserve-3d;
        }

        .poster-card:hover {
            transform: rotateY(10deg) rotateX(5deg);
            box-shadow: 20px 20px 60px rgba(0,0,0,0.7);
            border: 1px solid var(--primary-gold);
        }

        .ornament {
            width: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary-gold));
        }

        h1 {
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 3.5rem;
            color: var(--primary-gold);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .eid-english {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .message {
            color: #e0e0e0;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .footer-brand {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 25px;
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .year {
            font-size: 0.8rem;
            color: #00ffcc;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* ডেকোরেটিভ লাইট */
        .light {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, var(--primary-gold));
            top: -20px;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="poster-card">
        <div class="light" style="left: 20px;"></div>
        <div class="light" style="right: 20px;"></div>
        
        <div class="moon">
            <svg class="ornament" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm1-13h-2v5H7v2h4v5h2v-5h4v-2h-4V7z"/>
            </svg>
        </div>

        <h1>ঈদ মোবারক</h1>
        <div class="eid-english">Eid Mubarak</div>
        
        <p class="message">
            পবিত্র ঈদুল ফিতরের মহিমায় আপনার জীবন আনন্দময় ও বরকতময় হয়ে উঠুক। গালিব একাডেমির পক্ষ থেকে জানাই আন্তরিক শুভেচ্ছা।
        </p>
        
        <div class="footer-brand">
            <div class="brand-name">গালিব একাডেমি</div>
            <div class="year">EID SPECIAL 2026</div>
        </div>
    </div>

</body>
</html>
