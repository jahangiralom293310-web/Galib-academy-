<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galib Academy Design</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        /* কভার ফটো ডিজাইন (৮২০x৩১২ পিক্সেল) */
        .cover-photo {
            width: 820px;
            height: 312px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 50px;
        }

        .cover-content h1 {
            font-size: 50px;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .cover-content p {
            font-size: 20px;
            margin-top: 10px;
            opacity: 0.9;
        }

        .features {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        /* লোগো ডিজাইন (৫০০x৫০০ পিক্সেল) */
        .logo-box {
            width: 300px;
            height: 300px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 10px solid #1e3c72;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-text {
            text-align: center;
            color: #1e3c72;
        }

        .logo-text h2 {
            font-size: 80px;
            margin: 0;
            line-height: 1;
        }

        .logo-text span {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>ফেসবুক কভার ফটো ডিজাইন:</h2>
    <div class="cover-photo">
        <div class="cover-content">
            <h1>গালিব একাডেমী</h1>
            <p>সহজ পাঠ • সঠিক শিক্ষা • উজ্জ্বল ভবিষ্যৎ</p>
            <div class="features">
                <span>📖 আরবি শিক্ষা</span>
                <span>📝 একাডেমিক কোর্স</span>
                <span>🎓 অনলাইন এক্সাম</span>
            </div>
        </div>
    </div>

    <hr style="width: 100%; margin: 40px 0;">

    <h2>প্রোফাইল পিকচার (লোগো) ডিজাইন:</h2>
    <div class="logo-box">
        <div class="logo-text">
            <h2>GA</h2>
            <span>GALIB ACADEMY</span>
        </div>
    </div>

</body>
</html>
