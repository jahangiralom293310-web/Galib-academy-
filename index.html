<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ঈদ মোবারক পোস্টার</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
        }

        .poster-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .poster-card::before {
            content: "🌙";
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }

        h1 {
            color: #ffd700;
            font-size: 3rem;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .academy-name {
            font-weight: bold;
            font-size: 1.5rem;
            color: #00ffcc;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* ছোট এনিমেশন */
        @keyframes glow {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .poster-card:hover {
            animation: glow 2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="poster-card">
        <h1>ঈদ মোবারক</h1>
        <p>পবিত্র ঈদুল ফিতরের আনন্দ ছড়িয়ে পড়ুক সবার মনে। আপনার এবং আপনার পরিবারের জন্য রইলো অনেক অনেক শুভকামনা ও ভালোবাসা।</p>
        
        <div class="academy-name">
            শুভেচ্ছান্তে: গালিব একাডেমি
        </div>

        <div class="footer">
            &copy; ২০২৬ | সবার জন্য শিক্ষা
        </div>
    </div>

</body>
</html>
