    function showQ() {
        if(index >= quizData.length) {
            document.getElementById('app').innerHTML = `<h1>পরীক্ষা শেষ!</h1><p>আপনার স্কোর: ${score}/${quizData.length}</p><button onclick="location.reload()">হোমে ফিরুন</button>`;
            return;
        }
        const q = quizData[index];
        document.getElementById('qText').innerText = q.q;
        const box = document.getElementById('optionsBox');
        box.innerHTML = "";
        q.o.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => { if(opt === q.a) score++; index++; showQ(); };
            box.appendChild(div);
        });
    }
</script>
</body>
</html>
