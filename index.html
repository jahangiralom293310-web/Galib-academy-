<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Eid Greeting | Galib Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Noto+Serif+Bengali:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #fceabb 0%, #f8b500 50%, #fceabb 100%);
            --deep-royal: #060c21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--deep-royal); overflow: hidden;
            font-family: 'Hind Siliguri', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* ডাইনামিক গোল্ডেন পার্টিকেল ব্যাকগ্রাউন্ড */
        .canvas-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1931 0%, #000 100%);
            z-index: -1;
        }

        .poster-frame {
            position: relative;
            width: 380px; height: 550px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid;
            border-image: var(--gold) 1;
            box-shadow: 0 0 50px rgba(248, 181, 0, 0.15);
            padding: 40px;
            text-align: center;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* কোণায় ডেকোরেশন */
        .corner {
            position: absolute; width: 60px; height: 60px;
            border: 2px solid #f8b500;
        }
        .top-left { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .moon-glow {
            width: 80px; height: 80px;
            background: #f8b500;
            border-radius: 50%;
            margin: 0 auto 30px;
            filter: blur(40px);
            opacity: 0.6;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        h1 {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 3.5rem;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 0 5px rgba(248,181,0,0.3));
        }

        .eng-sub {
            color: #fff;
            letter-spacing: 6px;
            font-size: 0.9rem;
            margin-bottom: 40px;
            opacity: 0.7;
        }

        .divider {
            width: 50px; height: 2px;
            background: var(--gold);
            margin: 20px auto;
        }

        .message {
            color: #d4d4d4;
            line-height: 1.8;
            font-size: 1.1rem;
            font-weight: 300;
        }

        .footer-brand {
            position: absolute;
            bottom: 40px; left: 0; width: 100%;
        }

        .brand-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .tagline {
            color: #f8b500;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* আলোর কণা অ্যানিমেশন */
        .sparkle {
            position: absolute; background: white; border-radius: 50%;
            animation: move-sparkle 10s linear infinite;
        }
        @keyframes move-sparkle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="canvas-bg" id="sparkles-container"></div>

    <div class="poster-frame">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>
        
        <div class="moon-glow"></div>
        
        <h1>ঈদ মোবারক</h1>
        <div class="eng-sub">EID MUBARAK</div>
        
        <div class="divider"></div>
        
        <p class="message">
            পবিত্র ঈদের এই আলোকবর্তিকা আপনার জীবনকে সমৃদ্ধি, সুস্বাস্থ্য এবং সাফল্যে ভরিয়ে তুলুক।
        </p>
        
        <div class="footer-brand">
            <div class="brand-name">গালিব একাডেমি</div>
            <div class="tagline">Leading with Excellence | 2026</div>
        </div>
    </div>

    <script>
        // ব্যাকগ্রাউন্ডে আলোর কণা তৈরি
        const container = document.getElementById('sparkles-container');
        for (let i = 0; i < 50; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 3 + 'px';
            sparkle.style.width = size;
            sparkle.style.height = size;
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.animationDuration = Math.random() * 5 + 5 + 's';
            sparkle.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(sparkle);
        }
    </script>
</body>
</html>
