<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galib Academy - Next Gen Educational Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-blue: #38bdf8;
            --neon-purple: #818cf8;
            --emerald: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: #f8fafc;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 1. High-Quality Animated Welcome Screen */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .welcome-content {
            text-align: center;
            animation: pulseGlow 2.5s infinite alternate;
        }

        .welcome-logo {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            transform: scale(0.85);
            animation: scaleUp 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .welcome-subtitle {
            font-size: 1.3rem;
            color: #94a3b8;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInText 1s 0.6s forwards;
        }

        @keyframes scaleUp { to { transform: scale(1); } }
        @keyframes fadeInText { to { opacity: 1; } }
        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.2)); }
            100% { filter: drop-shadow(0 0 40px rgba(129, 140, 248, 0.5)); }
        }

        /* Layout Architecture */
        .main-layout {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 35px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1) 0.2s;
        }

        .main-layout.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Glassmorphism Common Blueprint */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .panel-header-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 2. QR Scanner Section Styling */
        .reader-wrapper {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 1 / 1;
        }

        #reader { width: 100% !important; border: none !important; }
        #reader video { object-fit: cover !important; }

        .scan-anim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, transparent, var(--neon-blue), transparent);
            box-shadow: 0 0 20px var(--neon-blue);
            animation: scan 2s linear infinite;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .btn-prime {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            margin-top: 20px;
        }

        .btn-prime:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }

        .btn-prime.stop-btn {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        /* Result Box */
        .result-panel {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 15px;
            display: none;
            border: 1px solid var(--glass-border);
        }

        .result-text {
            word-break: break-all;
            font-size: 0.95rem;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 8px;
        }

        /* 3. Unique MCQ Quiz Engine Styling */
        .quiz-meta {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .question-box {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--neon-blue);
            transform: translateX(5px);
        }

        .option-card.correct {
            background: rgba(52, 211, 153, 0.15) !important;
            border-color: var(--emerald) !important;
            color: var(--emerald);
        }

        .option-card.wrong {
            background: rgba(239, 68, 68, 0.15) !important;
            border-color: #ef4444 !important;
            color: #ef4444;
        }

        /* 4. Canvas Certificate Showcase & Downloader */
        .certificate-preview-box {
            width: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            margin-bottom: 15px;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 5. Live Public Comment System */
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .comment-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: #f8fafc;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            transition: 0.3s;
        }

        .comment-input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.2);
        }

        .btn-comment {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            transition: 0.2s;
        }

        .comments-list {
            max-height: 220px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .comments-list::-webkit-scrollbar { width: 4px; }
        .comments-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .comment-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 15px;
            border-radius: 12px;
        }

        .comment-user {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--neon-blue);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div class="welcome-content">
            <div class="welcome-logo"><i class="fa-solid fa-graduation-cap"></i> Galib Academy</div>
            <div class="welcome-subtitle">জ্ঞান ও প্রযুক্তির মহাবিশ্বে স্বাগতম</div>
        </div>
    </div>

    <div class="main-layout" id="mainLayout">
        
        <div class="glass-panel">
            <div class="panel-header-title"><i class="fa-solid fa-qrcode"></i> QR Code Scanner</div>
            <div class="reader-wrapper">
                <div class="scan-anim" id="scanLine"></div>
                <div id="reader"></div>
            </div>
            <button class="btn-prime" id="actionBtn"><i class="fa-solid fa-camera"></i> স্ক্যানার চালু করুন</button>

            <div class="result-panel" id="resultPanel">
                <div class="result-text" id="resultContent">ফলাফল লোড হচ্ছে...</div>
            </div>
        </div>

        <div class="glass-panel">
            <div class="panel-header-title"><i class="fa-solid fa-brain"></i> ডাইনামিক কুইজ সিস্টেম</div>
            <div class="quiz-meta">
                <span id="question-number">প্রশ্ন ১/১০০</span>
                <span><i class="fa-solid fa-bolt" style="color: gold;"></i> ইউনিক সেট</span>
            </div>
            <div class="question-box" id="questionText">লোড হচ্ছে...</div>
            <div class="options-grid" id="optionsContainer"></div>
            <button class="btn-prime" id="nextQuizBtn" style="display: none; margin-top: 20px; background: linear-gradient(135deg, #10b981, #059669);">পরবর্তী প্রশ্ন</button>
        </div>

        <div class="glass-panel">
            <div class="panel-header-title"><i class="fa-solid fa-award"></i> ইনস্ট্যান্ট সার্টিফিকেট জেনারেটর</div>
            <div class="certificate-preview-box">
                <canvas id="certCanvas" width="800" height="550"></canvas>
            </div>
            <button class="btn-prime" id="downloadCertBtn" style="background: linear-gradient(135deg, #818cf8, #6366f1);"><i class="fa-solid fa-download"></i> সার্টিফিকেট ডাউনলোড করুন</button>
        </div>

        <div class="glass-panel">
            <div class="panel-header-title"><i class="fa-solid fa-comments"></i> গ্লোবাল কমেন্ট ওয়াল</div>
            <div class="comment-form">
                <textarea class="comment-input" id="commentInput" rows="2" placeholder="আপনার অনুভূতি বা মতামত এখানে শেয়ার করুন..."></textarea>
                <button class="btn-comment" id="submitCommentBtn">পোস্ট করুন</button>
            </div>
            <div class="comments-list" id="commentsList">
                <div class="comment-item">
                    <div class="comment-user"><i class="fa-solid fa-circle-user"></i> আরিয়ান খান</div>
                    <div>কুইজের প্রশ্নগুলো প্রতিবার রিলোড দিলে বদলে যায়! দারুন মেকানিজম।</div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        // Welcome Screen Visual Transitions
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('welcome-overlay').style.opacity = '0';
                document.getElementById('welcome-overlay').style.visibility = 'hidden';
                document.getElementById('mainLayout').classList.add('show');
                generateCertificate("সফল শিক্ষার্থী");
            }, 3000);
        });

        // --- 1. QR Code Engine Core ---
        const html5QrcodeScanner = new Html5Qrcode("reader");
        const actionBtn = document.getElementById('actionBtn');
        const scanLine = document.getElementById('scanLine');
        const resultPanel = document.getElementById('resultPanel');
        const resultContent = document.getElementById('resultContent');
        let isScanning = false;

        const onScanSuccess = (decodedText) => {
            if (navigator.vibrate) navigator.vibrate(100);
            stopScanner();
            resultPanel.style.display = 'block';
            resultContent.innerHTML = decodedText.startsWith('http') ? `<a href="${decodedText}" target="_blank" style="color: #38bdf8; text-decoration: underline;">${decodedText}</a>` : decodedText;
        };

        const startScanner = () => {
            resultPanel.style.display = 'none';
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess, () => {})
            .then(() => {
                isScanning = true;
                scanLine.style.display = 'block';
                actionBtn.innerHTML = '<i class="fa-solid fa-stop"></i> স্ক্যানার বন্ধ করুন';
                actionBtn.classList.add('stop-btn');
            }).catch(err => console.error(err));
        };

        const stopScanner = () => {
            html5QrcodeScanner.stop().then(() => {
                isScanning = false;
                scanLine.style.display = 'none';
                actionBtn.innerHTML = '<i class="fa-solid fa-camera"></i> স্ক্যানার চালু করুন';
                actionBtn.classList.remove('stop-btn');
            }).catch(err => console.error(err));
        };

        actionBtn.addEventListener('click', () => isScanning ? stopScanner() : startScanner());


        // --- 2. 100 Premium Dynamic Questions Repository ---
        const rawQuestions = [
            { q: "আরবি ভাষায় মোট হরফ বা বর্ণ কয়টি?", o: ["২৮টি", "২৯টি", "৩০টি", "২৬টি"], a: "২৯টি" },
            { q: "নিচের কোনটি পবিত্র আল-কুরআনের সবচেয়ে বড় সূরা?", o: ["সূরা আল-ইমরান", "সূরা আল-বাকারা", "সূরা ইয়াসিন", "সূরা আল-ফাতিহা"], a: "সূরা আল-বাকারা" },
            { q: "জের, জবর ও পেশ-কে একত্রে আরবি ব্যাকরণে কী বলা হয়?", o: ["তানভীন", "হরকত", "মাদ্দ", "যযম"], a: "হরকত" },
            { q: "পবিত্র কুরআনে কতটি সূরা রয়েছে?", o: ["১১৪টি", "১১২টি", "১১৫টি", "১১০টি"], a: "১১৪টি" },
            { q: "আরবি ব্যাকরণে 'ইসম' বলতে সাধারণত কী বোঝায়?", o: ["ক্রিয়া", "বিশেষ্য বা নাম", "অব্যয়", "সর্বনাম"], a: "বিশেষ্য বা নাম" },
            { q: "আল-কুরআনের প্রথম কোন সূরাটি পূর্ণাঙ্গ অবতীর্ণ হয়?", o: ["সূরা আল-আলাক", "সূরা আল-ফাতিহা", "সূরা আল-ইখলাস", "সূরা আন-নাস"], a: "সূরা আল-ফাতিহা" },
            { q: "আরবি হরফের উচ্চারণের স্থানকে কী বলা হয়?", o: ["সিফাত", "মাখরাজ", "ইদগাম", "ইখফা"], a: "মাখরাজ" },
            { q: "আরবি ভাষায় 'লা' (لا) শব্দের অর্থ কী?", o: ["হ্যাঁ", "না", "এবং", "অথবা"], a: "না" },
            { q: "পবিত্র কুরআনের কোন সূরাকে কুরআনের হৃদয় বলা হয়?", o: ["সূরা আর-রহমান", "সূরা ইয়াসিন", "সূরা আল-মুলক", "সূরা আল-কাহফ"], a: "সূরা ইয়াসিন" },
            { q: "আরবি হরফে মাখরাজ মোট কয়টি?", o: ["১৫টি", "১৭টি", "২৯টি", "১৪টি"], a: "১৭টি" },
            { q: "আরবি ব্যাকরণে 'ফেয়েল' (الفعل) শব্দটির অর্থ কী?", o: ["নাম", "কাজ বা ক্রিয়া", "অব্যয়", "বাক্য"], a: "কাজ বা ক্রিয়া" },
            { q: "আল-কুরআনের সবচেয়ে ছোট সূরা কোনটি?", o: ["সূরা আল-আসর", "সূরা আল-কাওসার", "সূরা আল-ইখলাস", "সূরা ফালাক"], a: "সূরা আল-কাওসার" },
            { q: "আরবি ব্যাকরণে তানভীন কাকে বলে?", o: ["এক জবর, এক জের ও এক পেশ", "দুই জবর, দুই জের ও দুই পেশ", "যযম যুক্ত হরফ", "তাসদীদ যুক্ত হরফ"], a: "দুই জবর, দুই জের ও দুই পেশ" },
            { q: "পবিত্র কুরআনের কোন সূরাটি বিসমিল্লাহ ছাড়া শুরু হয়েছে?", o: ["সূরা ইউনুস", "সূরা তাওবাহ", "সূরা হুদ", "সূরা নামল"], a: "সূরা তাওবাহ" },
            { q: "আরবি ভাষায় স্বরচিহ্ন বা হরকত প্রবর্তন করেন কে?", o: ["হাজ্জাজ বিন ইউসুফ", "আবু আসওয়াদ আদ-দুয়ালী", "খলিল বিন আহমদ", "ইমাম বুখারী"], a: "আবু আসওয়াদ আদ-দুয়ালী" },
            { q: "কোন সূরাকে 'উম্মুল কুরআন' বলা হয়?", o: ["সূরা আল-বাকারা", "সূরা আল-ফাতিহা", "সূরা ইয়াসিন", "সূরা আর-রহমান"], a: "সূরা আল-ফাতিহা" },
            { q: "আরবি ভাষায় 'নাআম' (نعم) শব্দের অর্থ কী?", o: ["না", "হ্যাঁ", "ধন্যবাদ", "স্বাগতম"], a: "হ্যাঁ" },
            { q: "পবিত্র কুরআনে কতটি সেজদাহ রয়েছে?", o: ["১২টি", "১৪টি", "১৫টি", "১০টি"], a: "১৪টি" },

        // Shuffle Master Algorithm (Knuth Shuffle)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Randomize questions pool and options
        let currentQuestions = shuffleArray([...rawQuestions]); 
        currentQuestions.forEach(item => item.o = shuffleArray([...item.o]));

        let currentQuestionIndex = 0;

        function loadQuiz() {
            const nextBtn = document.getElementById('nextQuizBtn');
            nextBtn.style.display = 'none';
            if (currentQuestionIndex >= currentQuestions.length) {
                document.getElementById('questionText').innerText = "অভিনন্দন! আপনি ১০০টি প্রশ্নের এই কুইজ সফলভাবে সম্পন্ন করেছেন।";
                document.getElementById('optionsContainer').innerHTML = "";
                document.getElementById('question-number').innerText = "সমাপ্ত";
                return;
            }

            document.getElementById('question-number').innerText = `প্রশ্ন ${currentQuestionIndex + 1}/${currentQuestions.length}`;
            const activeData = currentQuestions[currentQuestionIndex];
            document.getElementById('questionText').innerText = activeData.q;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = "";

            activeData.o.forEach(option => {
                const card = document.createElement('div');
                card.classList.add('option-card');
                card.innerHTML = `<i class="fa-regular fa-circle"></i> <span>${option}</span>`;
                card.addEventListener('click', () => selectAnswer(card, option, activeData.a));
                optionsContainer.appendChild(card);
            });
        }

        function selectAnswer(selectedCard, chosen, correct) {
            const allCards = document.querySelectorAll('.option-card');
            allCards.forEach(card => card.style.pointerEvents = 'none'); 

            if (chosen === correct) {
                selectedCard.classList.add('correct');
                selectedCard.querySelector('i').className = "fa-solid fa-circle-check";
            } else {
                selectedCard.classList.add('wrong');
                selectedCard.querySelector('i').className = "fa-solid fa-circle-xmark";
                allCards.forEach(card => {
                    if (card.querySelector('span').innerText === correct) {
                        card.classList.add('correct');
                        card.querySelector('i').className = "fa-solid fa-circle-check";
                    }
                });
            }
            document.getElementById('nextQuizBtn').style.display = 'block';
        }

        document.getElementById('nextQuizBtn').addEventListener('click', () => {
            currentQuestionIndex++;
            loadQuiz();
        });

        loadQuiz(); 


        // --- 3. Dynamic Premium Certificate Architecture ---
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');

        function generateCertificate(studentName) {
            ctx.fillStyle = '#0b0f19';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 4;
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

            ctx.strokeStyle = '#818cf8';
            ctx.lineWidth = 1;
            ctx.strokeRect(28, 28, canvas.width - 56, canvas.height - 56);

            ctx.fillStyle = '#38bdf8';
            ctx.fillRect(20, 20, 60, 6);
            ctx.fillRect(20, 20, 6, 60);

            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.font = 'bold 36px "Hind Siliguri", sans-serif';
            ctx.fillText("GALIB ACADEMY", canvas.width / 2, 110);

            ctx.fillStyle = '#94a3b8';
            ctx.font = '18px "Hind Siliguri", sans-serif';
            ctx.fillText("সাফল্য ও কৃতিত্বের স্বীকৃতিস্বরূপ", canvas.width / 2, 160);

            ctx.fillStyle = '#38bdf8';
            ctx.font = 'bold 28px "Hind Siliguri", sans-serif';
            ctx.fillText("সম্মাননা সনদপত্র", canvas.width / 2, 210);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 32px "Hind Siliguri", sans-serif';
            ctx.fillText(studentName, canvas.width / 2, 290);

            ctx.fillStyle = 'rgba(129, 140, 248, 0.4)';
            ctx.fillRect(canvas.width / 2 - 150, 305, 300, 3);

            ctx.fillStyle = '#cbd5e1';
            ctx.font = '16px "Hind Siliguri", sans-serif';
            ctx.fillText("অনলাইন কুইজ এবং একাডেমিক সেশনে সফলতার সাথে উত্তীর্ণ হয়েছেন।", canvas.width / 2, 350);

            ctx.fillStyle = '#38bdf8';
            ctx.font = 'italic 18px cursive';
            ctx.fillText("Galib", canvas.width / 2, 450); 
            
            ctx.fillStyle = '#64748b';
            ctx.font = '14px "Hind Siliguri", sans-serif';
            ctx.fillText("পরিচালক, গালিব একাডেমি", canvas.width / 2, 475);
        }

        document.getElementById('downloadCertBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'Galib_Academy_Certificate.png';
            link.href = canvas.toDataURL();
            link.click();
        });


        // --- 4. Live Interaction Flow System ---
        const commentInput = document.getElementById('commentInput');
        const submitCommentBtn = document.getElementById('submitCommentBtn');
        const commentsList = document.getElementById('commentsList');

        submitCommentBtn.addEventListener('click', () => {
            const text = commentInput.value.trim();
            if(!text) return alert("মন্তব্যের বক্সে কিছু লিখুন!");

            const item = document.createElement('div');
            item.classList.add('comment-item');
            item.innerHTML = `<div class="comment-user"><i class="fa-solid fa-circle-user"></i> শিক্ষার্থী (অতিথি)</div><div>${text}</div>`;
            
            commentsList.insertBefore(item, commentsList.firstChild);
            commentInput.value = "";
        });
    </script>
