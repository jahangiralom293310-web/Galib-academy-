<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 2026 | Galib Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf67;
            --royal-blue: #050b18;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--royal-blue);
            font-family: 'Hind Siliguri', sans-serif;
        }

        /* মোশন ব্যাকগ্রাউন্ড */
        .bg-animate {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        /* অ্যানিমেটেড তারা */
        .stars-container { position: absolute; width: 100%; height: 100%; }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* মেইন পোস্টার কার্ড */
        .poster-card {
            position: relative; z-index: 10;
            width: 90%; max-width: 450px;
            margin: auto; top: 50%; transform: translateY(-50%);
            padding: 50px 30px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 207, 103, 0.2);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(25px);
            text-align: center;
        }

        /* ঈদ মোবারক নিওন ইফেক্ট */
        .eid-text {
            font-size: 4rem; font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 207, 103, 0.5), 
                         0 0 30px rgba(255, 207, 103, 0.3);
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .sub-text {
            color: #fff; font-size: 1.2rem; font-weight: 300;
            letter-spacing: 4px; opacity: 0.8; margin-bottom: 30px;
            text-transform: uppercase;
        }

        .message {
            color: #d1d1d1; font-size: 1.1rem; line-height: 1.8;
            margin-bottom: 40px; position: relative;
        }

        /* গালিব একাডেমি ব্র্যান্ডিং */
        .brand-box {
            border-top: 1px solid rgba(255,207,103,0.3);
            padding-top: 25px;
        }

        .brand-name {
            font-size: 1.8rem; font-weight: 700;
            color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.2);
        }

        .academy-tag {
            color: var(--gold); font-size: 0.8rem;
            letter-spacing: 3px; margin-top: 5px; font-weight: 700;
        }

        /* ছোট চাঁদ ও তারা আইকন */
        .moon-icon {
            font-size: 50px; color: var(--gold);
            margin-bottom: 15px; display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div class="stars-container" id="stars"></div>

    <div class="poster-card">
        <div class="moon-icon">🌙</div>
        <div class="eid-text">ঈদ মোবারক</div>
        <div class="sub-text">Eid Mubarak</div>
        
        <p class="message">
            পবিত্র ঈদুল ফিতরের খুশির জোয়ারে ভেসে যাক সকল দুঃখ-বেদনা। আপনার প্রতিটি দিন হোক আনন্দময় এবং সাফল্যমণ্ডিত।
        </p>
        
        <div class="brand-box">
            <div class="brand-name">গালিব একাডেমি</div>
            <div class="academy-tag">EDUCATION FOR EXCELLENCE</div>
        </div>
    </div>

    <script>
        // ব্যাকগ্রাউন্ডে তারা তৈরি করার স্ক্রিপ্ট
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
