<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galib Academy - শিখুন আপনার ভাষায়</title>
    <style>
        /* CSS ডিজাইন */
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #27ae60;
            --accent-color: #f39c12;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        /* হেডার ও নেভিগেশন */
        header {
            background: linear-gradient(to right, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            padding: 20px 5%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .instructor-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* মেইন কন্টেনার */
        .main-container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* কোর্স কার্ড গ্রিড */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        .card-content { padding: 20px; }

        .card h3 { color: var(--primary-color); margin-top: 0; }

        .btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        /* এক্সাম সেকশন */
        #exam-portal {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .question-block {
            margin-bottom: 20px;
            padding: 15px;
            border-left: 4px solid var(--accent-color);
            background: #fff9f0;
        }

        .result-box {
            text-align: center;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 8px;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Galib Academy</h1>
    <div class="instructor-badge">একমাত্র ইনস্ট্রাক্টর: <strong>Galib</strong></div>
</header>

<div class="main-container">
    <h2>উপলব্ধ কোর্সসমূহ</h2>
    <div class="course-grid" id="course-list">
        </div>

    <div id="exam-portal">
        <h2 id="current-exam-title">পরীক্ষা কেন্দ্র</h2>
        <div id="questions-area"></div>
        <button class="btn" style="background: #e67e22;" onclick="submitExam()">পরীক্ষা জমা দিন</button>
        
        <div id="result-display" class="result-box">
            <h3>আপনার ফলাফল</h3>
            <p id="score-text" style="font-size: 1.5rem; color: #27ae60;"></p>
            <button class="btn" onclick="location.reload()">আবার চেষ্টা করুন</button>
        </div>
    </div>
</div>

<script>
    // ১. ডাটাবেস: আপনার সব তথ্য এখানে থাকবে
    const academyDB = {
        instructor: "Galib",
        courses: [
            { id: 1, title: "আরবি ভাষা শিক্ষা (নাহু)", info: "সহজ পদ্ধতিতে আরবি ব্যাকরণ শিখুন।" },
            { id: 2, title: "কুরআন তাজবিদ", info: "শুদ্ধ উচ্চারণে কুরআন পাঠের পূর্ণাঙ্গ কোর্স।" },
            { id: 3, title: "ইসলামিক ইতিহাস", info: "প্রাথমিক যুগ থেকে বর্তমান পর্যন্ত ইসলামের ইতিহাস।" }
        ],
        exams: {
            questions: [
                { q: "আরবি হরফ মোট কয়টি?", opt: ["২৮", "২৯", "৩০"], ans: "২৯" },
                { q: "যের, যবর ও পেশকে কী বলে?", opt: ["তানউইন", "হারাকাত", "জযম"], ans: "হারাকাত" }
            ]
        }
    };

    // ২. কোর্সগুলো রেন্ডার করা
    function initApp() {
        const list = document.getElementById('course-list');
        academyDB.courses.forEach(course => {
            list.innerHTML += `
                <div class="card">
                    <div class="card-content">
                        <h3>${course.title}</h3>
                        <p>${course.info}</p>
                        <button class="btn" onclick="openExam('${course.title}')">পরীক্ষা শুরু করুন</button>
                    </div>
                </div>
            `;
        });
    }

    // ৩. এক্সাম ফাংশনালিটি
    function openExam(title) {
        document.getElementById('course-list').style.display = 'none';
        document.getElementById('exam-portal').style.display = 'block';
        document.getElementById('current-exam-title').innerText = title + " - পরীক্ষা";
        
        const area = document.getElementById('questions-area');
        area.innerHTML = '';
        
        academyDB.exams.questions.forEach((q, idx) => {
            area.innerHTML += `
                <div class="question-block">
                    <p><strong>${idx + 1}. ${q.q}</strong></p>
                    ${q.opt.map(o => `<input type="radio" name="q${idx}" value="${o}"> ${o}<br>`).join('')}
                </div>
            `;
        });
    }

    // ৪. রেজাল্ট ক্যালকুলেশন
    function submitExam() {
        let score = 0;
        const total = academyDB.exams.questions.length;

        academyDB.exams.questions.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            if (selected && selected.value === q.ans) {
                score++;
            }
        });

        document.getElementById('questions-area').style.display = 'none';
        const resBox = document.getElementById('result-display');
        resBox.style.display = 'block';
        document.getElementById('score-text').innerText = `আপনি ${total}-এর মধ্যে ${score} পেয়েছেন!`;
    }

    // অ্যাপ চালু
    initApp();
</script>

</body>
</html>
